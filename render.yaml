# Render.com デプロイ設定（Docker）。
# 「Deploy to Render」ボタン、または New → Blueprint → このリポジトリ で使えます。
# 必須の秘密は下で sync:false（デプロイ時に入力を求められる）。
services:
  - type: web
    name: tomato-clip-cloud
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free             # 無料枠（クレカ不要）。24h Bot 常時稼働には starter($7) 推奨
    healthCheckPath: /healthz
    envVars:
      - key: TOMATO_HOME
        value: /tmp/tomato_home
      - key: TOMATO_UNGATED
        value: "1"
      # ⭐ これ1つだけ貼ればOK：アプリの「☁ クラウド」→ セットアップで発行される鍵
      - key: TOMATO_ACCOUNT_TOKEN
        sync: false
      # ── 任意の env（GEMINI_KEY / DISCORD_BOT_TOKEN / TOMATO_BUNDLE 等）は、
      #    アカウント連携を使う場合は不要。必要な上級者はデプロイ後に
      #    Render の Environment 画面から手動で追加してください。
