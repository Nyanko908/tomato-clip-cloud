# Render.com デプロイ設定（Docker）。
# 「Deploy to Render」ボタン、または New → Blueprint → このリポジトリ で使えます。
# 必須の秘密は下で sync:false（デプロイ時に入力を求められる）。
services:
  - type: web
    name: tomato-clip-cloud
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free             # 無料枠（クレカ不要）。24h Bot 常時稼働には starter($7) 推奨
    healthCheckPath: /healthz
    envVars:
      - key: TOMATO_HOME
        value: /tmp/tomato_home
      - key: TOMATO_UNGATED
        value: "1"
      # ⭐ これ1つだけ貼ればOK：アプリの「☁ クラウド」→ セットアップで発行される鍵
      - key: TOMATO_ACCOUNT_TOKEN
        sync: false
      # ── 以下はすべて任意（アカウント連携を使うなら不要） ──
      - key: TOMATO_BUNDLE
        sync: false
      - key: TOMATO_BUNDLE_KEY
        sync: false
      - key: GEMINI_KEY
        sync: false
      - key: YOUTUBE_KEY
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: CREDENTIALS_JSON
        sync: false
      - key: YT_TOKEN_B64
        sync: false
      - key: YTDLP_COOKIES_B64
        sync: false
      - key: YTDLP_PROXY
        sync: false
